# Example secret. Do NOT commit real keys. Create the real one out of band, e.g.:
#
#   kubectl create secret generic speaking-character-secrets \
#     --from-literal=ELEVENLABS_API_KEY=sk_xxx \
#     --from-literal=ELEVENLABS_VOICE_ID=your_voice_id
#
apiVersion: v1
kind: Secret
metadata:
  name: speaking-character-secrets
  labels:
    app: speaking-character
type: Opaque
stringData:
  ELEVENLABS_API_KEY: "replace-me"
  ELEVENLABS_VOICE_ID: "replace-me"
