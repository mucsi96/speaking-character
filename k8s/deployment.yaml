apiVersion: apps/v1
kind: Deployment
metadata:
  name: speaking-character
  labels:
    app: speaking-character
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speaking-character
  template:
    metadata:
      labels:
        app: speaking-character
    spec:
      containers:
        - name: speaking-character
          # Replace with your built image reference.
          image: ghcr.io/mucsi96/speaking-character:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: CACHE_DIR
              value: /app/cache
            - name: ELEVENLABS_MODEL_ID
              value: eleven_multilingual_v2
          envFrom:
            - secretRef:
                name: speaking-character-secrets
          volumeMounts:
            - name: tts-cache
              mountPath: /app/cache
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: tts-cache
          emptyDir: {}
