<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="130mm" height="90mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="520" height="360" rx="16" fill="#f6eccf"/>
  <rect x="8" y="8" width="504" height="344" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- header -->
  <rect x="24" y="16" width="472" height="46" rx="10" fill="#1d4e89"/>
  <text x="260" y="36" text-anchor="middle" fill="#bfe0ff" font-size="12" letter-spacing="2">BLAUES SCHLOSS · BAUWERK 5</text>
  <text x="260" y="54" text-anchor="middle" fill="#fdf2d6" font-size="14" font-style="italic">Bauen &amp; übrige Teile zählen</text>

  <!-- title with accent chip -->
  <circle cx="42" cy="89" r="14" fill="#2e8b6f"/>
  <text x="42" y="94" text-anchor="middle" fill="#fdf2d6" font-size="16" font-weight="700">5</text>
  <text x="68" y="95" fill="#2e8b6f" font-size="22" font-weight="700">Fünfeck-Pyramide</text>

  <!-- ===== STEP 1: pentagon base ===== -->
  <rect x="30" y="110" width="140" height="180" rx="12" fill="#123a30"/>
  <circle cx="48" cy="128" r="10" fill="#2e8b6f"/>
  <text x="48" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">1</text>
  <g stroke="#5fc7a3" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="100" y1="218" x2="144" y2="233"/>
    <line x1="144" y1="233" x2="127" y2="258"/>
    <line x1="127" y1="258" x2="73" y2="258"/>
    <line x1="73" y1="258" x2="56" y2="233"/>
    <line x1="56" y1="233" x2="100" y2="218"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="100" cy="218" r="9" fill="#d9d9d9"/>
    <circle cx="144" cy="233" r="9" fill="#d9d9d9"/>
    <circle cx="127" cy="258" r="9" fill="#d9d9d9"/>
    <circle cx="73" cy="258" r="9" fill="#d9d9d9"/>
    <circle cx="56" cy="233" r="9" fill="#d9d9d9"/>
  </g>

  <!-- arrow 1->2 -->
  <path d="M174 200 L186 200" stroke="#c2a76a" stroke-width="3" stroke-linecap="round" marker-end="none"/>
  <path d="M182 195 L188 200 L182 205" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 2: raise the side rods ===== -->
  <rect x="190" y="110" width="140" height="180" rx="12" fill="#123a30"/>
  <circle cx="208" cy="128" r="10" fill="#2e8b6f"/>
  <text x="208" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">2</text>
  <!-- base -->
  <g stroke="#5fc7a3" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="260" y1="218" x2="304" y2="233"/>
    <line x1="304" y1="233" x2="287" y2="258"/>
    <line x1="287" y1="258" x2="233" y2="258"/>
    <line x1="233" y1="258" x2="216" y2="233"/>
    <line x1="216" y1="233" x2="260" y2="218"/>
  </g>
  <!-- side rods rising to the apex (being added) -->
  <g stroke="#5fc7a3" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <line x1="260" y1="218" x2="260" y2="160"/>
    <line x1="304" y1="233" x2="260" y2="160"/>
    <line x1="287" y1="258" x2="260" y2="160"/>
    <line x1="233" y1="258" x2="260" y2="160"/>
    <line x1="216" y1="233" x2="260" y2="160"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="260" cy="218" r="9" fill="#d9d9d9"/>
    <circle cx="304" cy="233" r="9" fill="#d9d9d9"/>
    <circle cx="287" cy="258" r="9" fill="#d9d9d9"/>
    <circle cx="233" cy="258" r="9" fill="#d9d9d9"/>
    <circle cx="216" cy="233" r="9" fill="#d9d9d9"/>
  </g>
  <circle cx="260" cy="160" r="9" fill="none" stroke="#5fc7a3" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- arrow 2->3 -->
  <path d="M334 200 L346 200" stroke="#c2a76a" stroke-width="3" stroke-linecap="round"/>
  <path d="M342 195 L348 200 L342 205" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 3: finished pyramid ===== -->
  <rect x="350" y="110" width="140" height="180" rx="12" fill="#123a30"/>
  <circle cx="368" cy="128" r="10" fill="#2e8b6f"/>
  <text x="368" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">3</text>
  <!-- side rods -->
  <g stroke="#5fc7a3" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="420" y1="218" x2="420" y2="160"/>
    <line x1="464" y1="233" x2="420" y2="160"/>
    <line x1="393" y1="258" x2="420" y2="160"/>
    <line x1="447" y1="258" x2="420" y2="160"/>
    <line x1="376" y1="233" x2="420" y2="160"/>
    <!-- base -->
    <line x1="420" y1="218" x2="464" y2="233"/>
    <line x1="464" y1="233" x2="447" y2="258"/>
    <line x1="447" y1="258" x2="393" y2="258"/>
    <line x1="393" y1="258" x2="376" y2="233"/>
    <line x1="376" y1="233" x2="420" y2="218"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="420" cy="218" r="9" fill="#d9d9d9"/>
    <circle cx="464" cy="233" r="9" fill="#d9d9d9"/>
    <circle cx="447" cy="258" r="9" fill="#d9d9d9"/>
    <circle cx="393" cy="258" r="9" fill="#d9d9d9"/>
    <circle cx="376" cy="233" r="9" fill="#d9d9d9"/>
    <circle cx="420" cy="160" r="10" fill="#ffd76a"/>
  </g>

  <!-- reminder -->
  <text x="260" y="324" text-anchor="middle" fill="#1d4e89" font-size="13">Baue dein Modell — die <tspan font-weight="700">übrigen Teile</tspan> kommen in die Mitte.</text>

  <!-- footer -->
  <text x="40" y="348" fill="#7a6a4a" font-size="11">C6 · Karte 5/5</text>
  <text x="480" y="348" text-anchor="end" font-size="13"><tspan fill="#e0a92e">★ ★</tspan><tspan fill="#d8c9a0"> ★</tspan></text>
</svg>
