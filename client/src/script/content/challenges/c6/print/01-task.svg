<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="130mm" height="90mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="520" height="360" rx="16" fill="#f6eccf"/>
  <rect x="8" y="8" width="504" height="344" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- header -->
  <rect x="24" y="16" width="472" height="46" rx="10" fill="#1d4e89"/>
  <text x="260" y="36" text-anchor="middle" fill="#bfe0ff" font-size="12" letter-spacing="2">BLAUES SCHLOSS · BAUWERK 1</text>
  <text x="260" y="54" text-anchor="middle" fill="#fdf2d6" font-size="14" font-style="italic">Bauen &amp; übrige Teile zählen</text>

  <!-- title with accent chip -->
  <circle cx="42" cy="89" r="14" fill="#c0392b"/>
  <text x="42" y="94" text-anchor="middle" fill="#fdf2d6" font-size="16" font-weight="700">1</text>
  <text x="68" y="95" fill="#c0392b" font-size="22" font-weight="700">Ikosaeder</text>

  <!-- ===== STEP 1: 5-spoke wheel (pentagon ring + hub) ===== -->
  <rect x="30" y="110" width="140" height="180" rx="12" fill="#3a130f"/>
  <circle cx="48" cy="128" r="10" fill="#c0392b"/>
  <text x="48" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">1</text>
  <!-- pentagon ring around center (100,210) -->
  <g stroke="#ef8a7d" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="100" y1="167" x2="141" y2="197"/>
    <line x1="141" y1="197" x2="125" y2="245"/>
    <line x1="125" y1="245" x2="75" y2="245"/>
    <line x1="75" y1="245" x2="59" y2="197"/>
    <line x1="59" y1="197" x2="100" y2="167"/>
  </g>
  <!-- spokes to hub -->
  <g stroke="#ef8a7d" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="100" y1="167" x2="100" y2="210"/>
    <line x1="141" y1="197" x2="100" y2="210"/>
    <line x1="125" y1="245" x2="100" y2="210"/>
    <line x1="75" y1="245" x2="100" y2="210"/>
    <line x1="59" y1="197" x2="100" y2="210"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="100" cy="167" r="9" fill="#d9d9d9"/>
    <circle cx="141" cy="197" r="9" fill="#d9d9d9"/>
    <circle cx="125" cy="245" r="9" fill="#d9d9d9"/>
    <circle cx="75" cy="245" r="9" fill="#d9d9d9"/>
    <circle cx="59" cy="197" r="9" fill="#d9d9d9"/>
    <circle cx="100" cy="210" r="9" fill="#d9d9d9"/>
  </g>

  <!-- arrow 1->2 -->
  <path d="M174 200 L186 200" stroke="#c2a76a" stroke-width="3" stroke-linecap="round" marker-end="none"/>
  <path d="M182 195 L188 200 L182 205" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 2: pentagonal antiprism (two rings) ===== -->
  <rect x="190" y="110" width="140" height="180" rx="12" fill="#3a130f"/>
  <circle cx="208" cy="128" r="10" fill="#c0392b"/>
  <text x="208" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">2</text>
  <!-- lower pentagon ring (front), center (260,230) -->
  <g stroke="#ef8a7d" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="260" y1="200" x2="289" y2="221"/>
    <line x1="289" y1="221" x2="278" y2="255"/>
    <line x1="278" y1="255" x2="242" y2="255"/>
    <line x1="242" y1="255" x2="231" y2="221"/>
    <line x1="231" y1="221" x2="260" y2="200"/>
  </g>
  <!-- upper pentagon ring (offset up ~25, rotated ~36deg), center (260,205) -->
  <g stroke="#ef8a7d" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <line x1="289" y1="196" x2="278" y2="160"/>
    <line x1="278" y1="160" x2="242" y2="160"/>
    <line x1="242" y1="160" x2="231" y2="196"/>
    <line x1="231" y1="196" x2="260" y2="175"/>
    <line x1="260" y1="175" x2="289" y2="196"/>
  </g>
  <!-- zig-zag rods between rings (antiprism) -->
  <g stroke="#ef8a7d" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="260" y1="200" x2="231" y2="196"/>
    <line x1="289" y1="221" x2="260" y2="175"/>
    <line x1="289" y1="221" x2="289" y2="196"/>
    <line x1="278" y1="255" x2="289" y2="196"/>
    <line x1="242" y1="255" x2="231" y2="196"/>
  </g>
  <g stroke="#ef8a7d" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <line x1="260" y1="200" x2="260" y2="175"/>
    <line x1="231" y1="221" x2="242" y2="160"/>
    <line x1="278" y1="255" x2="278" y2="160"/>
  </g>
  <!-- balls: upper ring -->
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="260" cy="175" r="9" fill="#d9d9d9"/>
    <circle cx="289" cy="196" r="9" fill="#d9d9d9"/>
    <circle cx="278" cy="160" r="9" fill="#d9d9d9"/>
    <circle cx="242" cy="160" r="9" fill="#d9d9d9"/>
    <circle cx="231" cy="196" r="9" fill="#d9d9d9"/>
  </g>
  <!-- balls: lower ring (front) -->
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="260" cy="200" r="9" fill="#d9d9d9"/>
    <circle cx="289" cy="221" r="9" fill="#d9d9d9"/>
    <circle cx="278" cy="255" r="9" fill="#d9d9d9"/>
    <circle cx="242" cy="255" r="9" fill="#d9d9d9"/>
    <circle cx="231" cy="221" r="9" fill="#d9d9d9"/>
  </g>

  <!-- arrow 2->3 -->
  <path d="M334 200 L346 200" stroke="#c2a76a" stroke-width="3" stroke-linecap="round"/>
  <path d="M342 195 L348 200 L342 205" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 3: finished icosahedron ===== -->
  <rect x="350" y="110" width="140" height="180" rx="12" fill="#3a130f"/>
  <circle cx="368" cy="128" r="10" fill="#c0392b"/>
  <text x="368" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">3</text>
  <!-- center of model (420,205); top apex (420,148); bottom apex (420,262) -->
  <!-- hidden back edges (dashed) -->
  <g stroke="#ef8a7d" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <!-- upper ring back ball (420,162) connections -->
    <line x1="420" y1="148" x2="420" y2="162"/>
    <line x1="420" y1="162" x2="380" y2="178"/>
    <line x1="420" y1="162" x2="460" y2="178"/>
    <!-- lower ring back ball (420,248) connections -->
    <line x1="420" y1="262" x2="420" y2="248"/>
    <line x1="420" y1="248" x2="383" y2="232"/>
    <line x1="420" y1="248" x2="457" y2="232"/>
    <!-- antiprism back edges -->
    <line x1="420" y1="162" x2="383" y2="232"/>
    <line x1="420" y1="162" x2="457" y2="232"/>
  </g>
  <!-- visible edges -->
  <g stroke="#ef8a7d" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- top apex to upper ring (front) -->
    <line x1="420" y1="148" x2="380" y2="178"/>
    <line x1="420" y1="148" x2="460" y2="178"/>
    <line x1="420" y1="148" x2="398" y2="218"/>
    <line x1="420" y1="148" x2="442" y2="218"/>
    <!-- upper ring (front) -->
    <line x1="380" y1="178" x2="398" y2="218"/>
    <line x1="398" y1="218" x2="442" y2="218"/>
    <line x1="442" y1="218" x2="460" y2="178"/>
    <!-- bottom apex to lower ring (front) -->
    <line x1="420" y1="262" x2="383" y2="232"/>
    <line x1="420" y1="262" x2="457" y2="232"/>
    <line x1="420" y1="262" x2="398" y2="218"/>
    <line x1="420" y1="262" x2="442" y2="218"/>
    <!-- antiprism front edges -->
    <line x1="398" y1="218" x2="383" y2="232"/>
    <line x1="398" y1="218" x2="380" y2="178"/>
    <line x1="442" y1="218" x2="457" y2="232"/>
    <line x1="442" y1="218" x2="460" y2="178"/>
    <line x1="383" y1="232" x2="457" y2="232"/>
  </g>
  <!-- balls -->
  <g stroke-width="2.5" stroke="#ffffff">
    <!-- upper ring -->
    <circle cx="380" cy="178" r="9" fill="#d9d9d9"/>
    <circle cx="460" cy="178" r="9" fill="#d9d9d9"/>
    <circle cx="420" cy="162" r="9" fill="#d9d9d9"/>
    <!-- lower ring -->
    <circle cx="398" cy="218" r="9" fill="#d9d9d9"/>
    <circle cx="442" cy="218" r="9" fill="#d9d9d9"/>
    <circle cx="383" cy="232" r="9" fill="#d9d9d9"/>
    <circle cx="457" cy="232" r="9" fill="#d9d9d9"/>
    <circle cx="420" cy="248" r="9" fill="#d9d9d9"/>
    <!-- apexes -->
    <circle cx="420" cy="262" r="9" fill="#d9d9d9"/>
    <circle cx="420" cy="148" r="10" fill="#ffd76a"/>
  </g>

  <!-- reminder -->
  <text x="260" y="324" text-anchor="middle" fill="#1d4e89" font-size="13">Baue dein Modell — die <tspan font-weight="700">übrigen Teile</tspan> kommen in die Mitte.</text>

  <!-- footer -->
  <text x="40" y="348" fill="#7a6a4a" font-size="11">C6 · Karte 1/5</text>
  <text x="480" y="348" text-anchor="end" font-size="13"><tspan fill="#e0a92e">★ ★ ★</tspan></text>
</svg>
