<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="130mm" height="90mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="520" height="360" rx="16" fill="#f6eccf"/>
  <rect x="8" y="8" width="504" height="344" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- header -->
  <rect x="24" y="16" width="472" height="46" rx="10" fill="#1d4e89"/>
  <text x="260" y="36" text-anchor="middle" fill="#bfe0ff" font-size="12" letter-spacing="2">BLAUES SCHLOSS · BAUWERK 2</text>
  <text x="260" y="54" text-anchor="middle" fill="#fdf2d6" font-size="14" font-style="italic">Bauen &amp; übrige Teile zählen</text>

  <!-- title with accent chip -->
  <circle cx="42" cy="89" r="14" fill="#8e44ad"/>
  <text x="42" y="94" text-anchor="middle" fill="#fdf2d6" font-size="16" font-weight="700">2</text>
  <text x="68" y="95" fill="#8e44ad" font-size="22" font-weight="700">Tetraeder XL</text>

  <!-- ===== STEP 1: flat triangular base with edge-midpoints ===== -->
  <rect x="30" y="110" width="108" height="180" rx="12" fill="#2a1235"/>
  <circle cx="48" cy="128" r="10" fill="#8e44ad"/>
  <text x="48" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">1</text>
  <!-- base triangle edges (each split by a midpoint) -->
  <g stroke="#c79be0" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- left edge: bottom-left -> apex-corner (top) -->
    <line x1="56" y1="262" x2="84" y2="178"/>
    <!-- right edge: apex-corner (top) -> bottom-right -->
    <line x1="84" y1="178" x2="112" y2="262"/>
    <!-- bottom edge: bottom-left -> bottom-right -->
    <line x1="56" y1="262" x2="112" y2="262"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <!-- corners -->
    <circle cx="84" cy="178" r="9" fill="#d9d9d9"/>
    <circle cx="56" cy="262" r="9" fill="#d9d9d9"/>
    <circle cx="112" cy="262" r="9" fill="#d9d9d9"/>
    <!-- edge midpoints -->
    <circle cx="70" cy="220" r="9" fill="#d9d9d9"/>
    <circle cx="98" cy="220" r="9" fill="#d9d9d9"/>
    <circle cx="84" cy="262" r="9" fill="#d9d9d9"/>
  </g>

  <!-- arrow 1->2 -->
  <path d="M142 200 L154 200" stroke="#c2a76a" stroke-width="3" stroke-linecap="round"/>
  <path d="M150 195 L156 200 L150 205" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 2: base + two side struts rising (being added) ===== -->
  <rect x="152" y="110" width="108" height="180" rx="12" fill="#2a1235"/>
  <circle cx="170" cy="128" r="10" fill="#8e44ad"/>
  <text x="170" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">2</text>
  <!-- base triangle -->
  <g stroke="#c79be0" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="178" y1="262" x2="206" y2="178"/>
    <line x1="206" y1="178" x2="234" y2="262"/>
    <line x1="178" y1="262" x2="234" y2="262"/>
  </g>
  <!-- two side struts rising from two base corners toward apex region (being added) -->
  <g stroke="#c79be0" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <line x1="178" y1="262" x2="206" y2="155"/>
    <line x1="234" y1="262" x2="206" y2="155"/>
  </g>
  <!-- base balls -->
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="206" cy="178" r="9" fill="#d9d9d9"/>
    <circle cx="178" cy="262" r="9" fill="#d9d9d9"/>
    <circle cx="234" cy="262" r="9" fill="#d9d9d9"/>
    <circle cx="192" cy="220" r="9" fill="#d9d9d9"/>
    <circle cx="220" cy="220" r="9" fill="#d9d9d9"/>
    <circle cx="206" cy="262" r="9" fill="#d9d9d9"/>
  </g>
  <!-- apex position marker (still empty) -->
  <circle cx="206" cy="155" r="9" fill="none" stroke="#c79be0" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- arrow 2->3 -->
  <path d="M264 200 L276 200" stroke="#c2a76a" stroke-width="3" stroke-linecap="round"/>
  <path d="M272 195 L278 200 L272 205" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 3: all three rising edges meeting near apex, mid-balls placed ===== -->
  <rect x="274" y="110" width="108" height="180" rx="12" fill="#2a1235"/>
  <circle cx="292" cy="128" r="10" fill="#8e44ad"/>
  <text x="292" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">3</text>
  <!-- base triangle -->
  <g stroke="#c79be0" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="300" y1="262" x2="328" y2="190"/>
    <line x1="328" y1="190" x2="356" y2="262"/>
    <line x1="300" y1="262" x2="356" y2="262"/>
  </g>
  <!-- three rising edges meeting near apex -->
  <g stroke="#c79be0" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="300" y1="262" x2="328" y2="150"/>
    <line x1="356" y1="262" x2="328" y2="150"/>
    <line x1="328" y1="190" x2="328" y2="150"/>
  </g>
  <!-- base balls + mid-balls on rising edges -->
  <g stroke-width="2.5" stroke="#ffffff">
    <!-- base corners -->
    <circle cx="328" cy="190" r="9" fill="#d9d9d9"/>
    <circle cx="300" cy="262" r="9" fill="#d9d9d9"/>
    <circle cx="356" cy="262" r="9" fill="#d9d9d9"/>
    <!-- base edge mids -->
    <circle cx="314" cy="226" r="9" fill="#d9d9d9"/>
    <circle cx="342" cy="226" r="9" fill="#d9d9d9"/>
    <circle cx="328" cy="262" r="9" fill="#d9d9d9"/>
    <!-- mids on the rising edges -->
    <circle cx="314" cy="206" r="9" fill="#d9d9d9"/>
    <circle cx="342" cy="206" r="9" fill="#d9d9d9"/>
    <circle cx="328" cy="170" r="9" fill="#d9d9d9"/>
  </g>
  <!-- apex marker (still empty) -->
  <circle cx="328" cy="150" r="9" fill="none" stroke="#c79be0" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- arrow 3->4 -->
  <path d="M386 200 L398 200" stroke="#c2a76a" stroke-width="3" stroke-linecap="round"/>
  <path d="M394 195 L400 200 L394 205" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 4: finished big tetrahedron (gold apex, doubled edges, 10 balls) ===== -->
  <rect x="396" y="110" width="108" height="180" rx="12" fill="#2a1235"/>
  <circle cx="414" cy="128" r="10" fill="#8e44ad"/>
  <text x="414" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">4</text>
  <!-- hidden back edge (dashed) from back corner to apex and to base mids -->
  <g stroke="#c79be0" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <line x1="450" y1="222" x2="450" y2="158"/>
    <line x1="420" y1="262" x2="450" y2="222"/>
    <line x1="480" y1="262" x2="450" y2="222"/>
  </g>
  <!-- front edges of the big tetrahedron -->
  <g stroke="#c79be0" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- front base edge -->
    <line x1="420" y1="262" x2="480" y2="262"/>
    <!-- left rising edge to apex -->
    <line x1="420" y1="262" x2="450" y2="158"/>
    <!-- right rising edge to apex -->
    <line x1="480" y1="262" x2="450" y2="158"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <!-- base front corners -->
    <circle cx="420" cy="262" r="9" fill="#d9d9d9"/>
    <circle cx="480" cy="262" r="9" fill="#d9d9d9"/>
    <!-- back/inner base corner -->
    <circle cx="450" cy="222" r="9" fill="#d9d9d9"/>
    <!-- front base edge mid -->
    <circle cx="450" cy="262" r="9" fill="#d9d9d9"/>
    <!-- mids on left & right rising edges -->
    <circle cx="435" cy="210" r="9" fill="#d9d9d9"/>
    <circle cx="465" cy="210" r="9" fill="#d9d9d9"/>
    <!-- mids on the two back/inner edges -->
    <circle cx="435" cy="242" r="9" fill="#d9d9d9"/>
    <circle cx="465" cy="242" r="9" fill="#d9d9d9"/>
    <!-- mid on back rising edge -->
    <circle cx="450" cy="190" r="9" fill="#d9d9d9"/>
    <!-- apex ball (gold) -->
    <circle cx="450" cy="158" r="10" fill="#ffd76a"/>
  </g>

  <!-- reminder -->
  <text x="260" y="324" text-anchor="middle" fill="#1d4e89" font-size="13">Baue dein Modell — die <tspan font-weight="700">übrigen Teile</tspan> kommen in die Mitte.</text>

  <!-- footer -->
  <text x="40" y="348" fill="#7a6a4a" font-size="11">C6 · Karte 2/5</text>
  <text x="480" y="348" text-anchor="end" font-size="13"><tspan fill="#e0a92e">★ ★</tspan><tspan fill="#d8c9a0"> ★</tspan></text>
</svg>
