<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="130mm" height="90mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="520" height="360" rx="16" fill="#f6eccf"/>
  <rect x="8" y="8" width="504" height="344" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- header -->
  <rect x="24" y="16" width="472" height="46" rx="10" fill="#1d4e89"/>
  <text x="260" y="36" text-anchor="middle" fill="#bfe0ff" font-size="12" letter-spacing="2">BLAUES SCHLOSS · BAUWERK 4</text>
  <text x="260" y="54" text-anchor="middle" fill="#fdf2d6" font-size="14" font-style="italic">Bauen &amp; übrige Teile zählen</text>

  <!-- title with accent chip -->
  <circle cx="42" cy="89" r="14" fill="#d97f1e"/>
  <text x="42" y="94" text-anchor="middle" fill="#fdf2d6" font-size="16" font-weight="700">4</text>
  <text x="68" y="95" fill="#d97f1e" font-size="22" font-weight="700">Würfel</text>

  <!-- ===== STEP 1: bottom square only ===== -->
  <rect x="30" y="110" width="108" height="180" rx="12" fill="#3a2710"/>
  <circle cx="48" cy="128" r="10" fill="#d97f1e"/>
  <text x="48" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">1</text>
  <!-- bottom square (oblique): front edge low-left, back edge up-right -->
  <g stroke="#f0b46a" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="60" y1="240" x2="100" y2="240"/>
    <line x1="100" y1="240" x2="118" y2="216"/>
    <line x1="118" y1="216" x2="78" y2="216"/>
    <line x1="78" y1="216" x2="60" y2="240"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="60" cy="240" r="9" fill="#d9d9d9"/>
    <circle cx="100" cy="240" r="9" fill="#d9d9d9"/>
    <circle cx="118" cy="216" r="9" fill="#d9d9d9"/>
    <circle cx="78" cy="216" r="9" fill="#d9d9d9"/>
  </g>

  <!-- arrow 1->2 -->
  <path d="M142 200 L154 200" stroke="#c2a76a" stroke-width="3" stroke-linecap="round"/>
  <path d="M150 195 L156 200 L150 205" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 2: vertical posts rising + top balls ===== -->
  <rect x="152" y="110" width="108" height="180" rx="12" fill="#3a2710"/>
  <circle cx="170" cy="128" r="10" fill="#d97f1e"/>
  <text x="170" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">2</text>
  <!-- bottom square -->
  <g stroke="#f0b46a" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="182" y1="248" x2="222" y2="248"/>
    <line x1="222" y1="248" x2="240" y2="224"/>
    <line x1="240" y1="224" x2="200" y2="224"/>
    <line x1="200" y1="224" x2="182" y2="248"/>
  </g>
  <!-- 4 vertical posts rising (being added, dashed) -->
  <g stroke="#f0b46a" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <line x1="182" y1="248" x2="182" y2="198"/>
    <line x1="222" y1="248" x2="222" y2="198"/>
    <line x1="240" y1="224" x2="240" y2="174"/>
    <line x1="200" y1="224" x2="200" y2="174"/>
  </g>
  <!-- bottom balls -->
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="182" cy="248" r="9" fill="#d9d9d9"/>
    <circle cx="222" cy="248" r="9" fill="#d9d9d9"/>
    <circle cx="240" cy="224" r="9" fill="#d9d9d9"/>
    <circle cx="200" cy="224" r="9" fill="#d9d9d9"/>
  </g>
  <!-- top balls placed on posts -->
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="182" cy="198" r="9" fill="#d9d9d9"/>
    <circle cx="222" cy="198" r="9" fill="#d9d9d9"/>
    <circle cx="240" cy="174" r="9" fill="#d9d9d9"/>
    <circle cx="200" cy="174" r="9" fill="#d9d9d9"/>
  </g>

  <!-- arrow 2->3 -->
  <path d="M264 200 L276 200" stroke="#c2a76a" stroke-width="3" stroke-linecap="round"/>
  <path d="M272 195 L278 200 L272 205" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 3: top square added ===== -->
  <rect x="274" y="110" width="108" height="180" rx="12" fill="#3a2710"/>
  <circle cx="292" cy="128" r="10" fill="#d97f1e"/>
  <text x="292" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">3</text>
  <!-- bottom square + posts -->
  <g stroke="#f0b46a" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="304" y1="248" x2="344" y2="248"/>
    <line x1="344" y1="248" x2="362" y2="224"/>
    <line x1="362" y1="224" x2="322" y2="224"/>
    <line x1="322" y1="224" x2="304" y2="248"/>
    <line x1="304" y1="248" x2="304" y2="198"/>
    <line x1="344" y1="248" x2="344" y2="198"/>
    <line x1="362" y1="224" x2="362" y2="174"/>
    <line x1="322" y1="224" x2="322" y2="174"/>
  </g>
  <!-- top square being added -->
  <g stroke="#f0b46a" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <line x1="304" y1="198" x2="344" y2="198"/>
    <line x1="344" y1="198" x2="362" y2="174"/>
    <line x1="362" y1="174" x2="322" y2="174"/>
    <line x1="322" y1="174" x2="304" y2="198"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="304" cy="248" r="9" fill="#d9d9d9"/>
    <circle cx="344" cy="248" r="9" fill="#d9d9d9"/>
    <circle cx="362" cy="224" r="9" fill="#d9d9d9"/>
    <circle cx="322" cy="224" r="9" fill="#d9d9d9"/>
    <circle cx="304" cy="198" r="9" fill="#d9d9d9"/>
    <circle cx="344" cy="198" r="9" fill="#d9d9d9"/>
    <circle cx="362" cy="174" r="9" fill="#d9d9d9"/>
    <circle cx="322" cy="174" r="9" fill="#d9d9d9"/>
  </g>

  <!-- arrow 3->4 -->
  <path d="M386 200 L398 200" stroke="#c2a76a" stroke-width="3" stroke-linecap="round"/>
  <path d="M394 195 L400 200 L394 205" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 4: finished cube ===== -->
  <rect x="396" y="110" width="108" height="180" rx="12" fill="#3a2710"/>
  <circle cx="414" cy="128" r="10" fill="#d97f1e"/>
  <text x="414" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">4</text>
  <!-- hidden back edges (dashed): back-bottom corner at (444,224); its 3 edges -->
  <g stroke="#f0b46a" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <!-- back-bottom-left to back-bottom-right -->
    <line x1="426" y1="248" x2="444" y2="224"/>
    <!-- back-bottom to back-top (vertical post) -->
    <line x1="444" y1="224" x2="444" y2="174"/>
    <!-- back-bottom along to front-back -->
    <line x1="444" y1="224" x2="484" y2="224"/>
  </g>
  <!-- visible edges -->
  <g stroke="#f0b46a" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- bottom front -->
    <line x1="426" y1="248" x2="466" y2="248"/>
    <line x1="466" y1="248" x2="484" y2="224"/>
    <!-- vertical posts (front three) -->
    <line x1="426" y1="248" x2="426" y2="198"/>
    <line x1="466" y1="248" x2="466" y2="198"/>
    <line x1="484" y1="224" x2="484" y2="174"/>
    <!-- top square -->
    <line x1="426" y1="198" x2="466" y2="198"/>
    <line x1="466" y1="198" x2="484" y2="174"/>
    <line x1="484" y1="174" x2="444" y2="174"/>
    <line x1="444" y1="174" x2="426" y2="198"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="426" cy="248" r="9" fill="#d9d9d9"/>
    <circle cx="466" cy="248" r="9" fill="#d9d9d9"/>
    <circle cx="484" cy="224" r="9" fill="#d9d9d9"/>
    <circle cx="444" cy="224" r="9" fill="#d9d9d9"/>
    <circle cx="426" cy="198" r="9" fill="#d9d9d9"/>
    <circle cx="484" cy="174" r="9" fill="#d9d9d9"/>
    <circle cx="444" cy="174" r="9" fill="#d9d9d9"/>
    <!-- key ball: top-front corner -->
    <circle cx="466" cy="198" r="10" fill="#ffd76a"/>
  </g>

  <!-- reminder -->
  <text x="260" y="324" text-anchor="middle" fill="#1d4e89" font-size="13">Baue dein Modell — die <tspan font-weight="700">übrigen Teile</tspan> kommen in die Mitte.</text>

  <!-- footer -->
  <text x="40" y="348" fill="#7a6a4a" font-size="11">C6 · Karte 4/5</text>
  <text x="480" y="348" text-anchor="end" font-size="13"><tspan fill="#e0a92e">★</tspan><tspan fill="#d8c9a0"> ★ ★</tspan></text>
</svg>
