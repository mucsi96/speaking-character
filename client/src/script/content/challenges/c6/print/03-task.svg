<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 470" width="130mm" height="117.5mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="520" height="470" rx="16" fill="#f6eccf"/>
  <rect x="8" y="8" width="504" height="454" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- header -->
  <rect x="24" y="16" width="472" height="46" rx="10" fill="#1d4e89"/>
  <text x="260" y="36" text-anchor="middle" fill="#bfe0ff" font-size="12" letter-spacing="2">BLAUES SCHLOSS · BAUWERK 3</text>
  <text x="260" y="54" text-anchor="middle" fill="#fdf2d6" font-size="14" font-style="italic">Bauen &amp; übrige Teile zählen</text>

  <!-- title with accent chip -->
  <circle cx="42" cy="89" r="14" fill="#2b6cb0"/>
  <text x="42" y="94" text-anchor="middle" fill="#fdf2d6" font-size="16" font-weight="700">3</text>
  <text x="68" y="95" fill="#2b6cb0" font-size="22" font-weight="700">Sechseck-Pyramide</text>

  <!-- ===== STEP 1: flat hexagon ring ===== -->
  <rect x="30" y="110" width="140" height="150" rx="12" fill="#0d3b56"/>
  <circle cx="48" cy="128" r="10" fill="#2b6cb0"/>
  <text x="48" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">1</text>
  <g stroke="#7fb4e6" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="100" y1="155" x2="138" y2="177"/>
    <line x1="138" y1="177" x2="138" y2="221"/>
    <line x1="138" y1="221" x2="100" y2="243"/>
    <line x1="100" y1="243" x2="62" y2="221"/>
    <line x1="62" y1="221" x2="62" y2="177"/>
    <line x1="62" y1="177" x2="100" y2="155"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="100" cy="155" r="9" fill="#d9d9d9"/>
    <circle cx="138" cy="177" r="9" fill="#d9d9d9"/>
    <circle cx="138" cy="221" r="9" fill="#d9d9d9"/>
    <circle cx="100" cy="243" r="9" fill="#d9d9d9"/>
    <circle cx="62" cy="221" r="9" fill="#d9d9d9"/>
    <circle cx="62" cy="177" r="9" fill="#d9d9d9"/>
  </g>

  <!-- arrow 1->2 -->
  <path d="M174 185 L186 185" stroke="#c2a76a" stroke-width="3" stroke-linecap="round"/>
  <path d="M182 180 L188 185 L182 190" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 2: hexagon + 6 spokes to center ===== -->
  <rect x="190" y="110" width="140" height="150" rx="12" fill="#0d3b56"/>
  <circle cx="208" cy="128" r="10" fill="#2b6cb0"/>
  <text x="208" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">2</text>
  <!-- hexagon base -->
  <g stroke="#7fb4e6" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="260" y1="155" x2="298" y2="177"/>
    <line x1="298" y1="177" x2="298" y2="221"/>
    <line x1="298" y1="221" x2="260" y2="243"/>
    <line x1="260" y1="243" x2="222" y2="221"/>
    <line x1="222" y1="221" x2="222" y2="177"/>
    <line x1="222" y1="177" x2="260" y2="155"/>
  </g>
  <!-- spokes to center (being added) -->
  <g stroke="#7fb4e6" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <line x1="260" y1="199" x2="260" y2="155"/>
    <line x1="260" y1="199" x2="298" y2="177"/>
    <line x1="260" y1="199" x2="298" y2="221"/>
    <line x1="260" y1="199" x2="260" y2="243"/>
    <line x1="260" y1="199" x2="222" y2="221"/>
    <line x1="260" y1="199" x2="222" y2="177"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="260" cy="155" r="9" fill="#d9d9d9"/>
    <circle cx="298" cy="177" r="9" fill="#d9d9d9"/>
    <circle cx="298" cy="221" r="9" fill="#d9d9d9"/>
    <circle cx="260" cy="243" r="9" fill="#d9d9d9"/>
    <circle cx="222" cy="221" r="9" fill="#d9d9d9"/>
    <circle cx="222" cy="177" r="9" fill="#d9d9d9"/>
  </g>

  <!-- arrow 2->3 -->
  <path d="M334 185 L346 185" stroke="#c2a76a" stroke-width="3" stroke-linecap="round"/>
  <path d="M342 180 L348 185 L342 190" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 3: raise two opposite pylons ===== -->
  <rect x="350" y="110" width="140" height="150" rx="12" fill="#0d3b56"/>
  <circle cx="368" cy="128" r="10" fill="#2b6cb0"/>
  <text x="368" y="132" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">3</text>
  <!-- hexagon base -->
  <g stroke="#7fb4e6" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="420" y1="155" x2="458" y2="177"/>
    <line x1="458" y1="177" x2="458" y2="221"/>
    <line x1="458" y1="221" x2="420" y2="243"/>
    <line x1="420" y1="243" x2="382" y2="221"/>
    <line x1="382" y1="221" x2="382" y2="177"/>
    <line x1="382" y1="177" x2="420" y2="155"/>
  </g>
  <!-- two opposite pylons rising (dashed, being added) -->
  <g stroke="#7fb4e6" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <line x1="420" y1="155" x2="420" y2="148"/>
    <line x1="382" y1="177" x2="420" y2="148"/>
    <line x1="420" y1="243" x2="420" y2="148"/>
    <line x1="458" y1="221" x2="420" y2="148"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="420" cy="155" r="9" fill="#d9d9d9"/>
    <circle cx="458" cy="177" r="9" fill="#d9d9d9"/>
    <circle cx="458" cy="221" r="9" fill="#d9d9d9"/>
    <circle cx="420" cy="243" r="9" fill="#d9d9d9"/>
    <circle cx="382" cy="221" r="9" fill="#d9d9d9"/>
    <circle cx="382" cy="177" r="9" fill="#d9d9d9"/>
  </g>
  <circle cx="420" cy="148" r="9" fill="none" stroke="#7fb4e6" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- ===== STEP 4: more rising rods on all sides ===== -->
  <rect x="30" y="280" width="140" height="150" rx="12" fill="#0d3b56"/>
  <circle cx="48" cy="298" r="10" fill="#2b6cb0"/>
  <text x="48" y="302" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">4</text>
  <!-- hexagon base -->
  <g stroke="#7fb4e6" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="100" y1="325" x2="138" y2="347"/>
    <line x1="138" y1="347" x2="138" y2="391"/>
    <line x1="138" y1="391" x2="100" y2="413"/>
    <line x1="100" y1="413" x2="62" y2="391"/>
    <line x1="62" y1="391" x2="62" y2="347"/>
    <line x1="62" y1="347" x2="100" y2="325"/>
  </g>
  <!-- all six rising rods converging upward (dashed) -->
  <g stroke="#7fb4e6" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <line x1="100" y1="325" x2="100" y2="320"/>
    <line x1="138" y1="347" x2="100" y2="320"/>
    <line x1="138" y1="391" x2="100" y2="320"/>
    <line x1="100" y1="413" x2="100" y2="320"/>
    <line x1="62" y1="391" x2="100" y2="320"/>
    <line x1="62" y1="347" x2="100" y2="320"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="100" cy="325" r="9" fill="#d9d9d9"/>
    <circle cx="138" cy="347" r="9" fill="#d9d9d9"/>
    <circle cx="138" cy="391" r="9" fill="#d9d9d9"/>
    <circle cx="100" cy="413" r="9" fill="#d9d9d9"/>
    <circle cx="62" cy="391" r="9" fill="#d9d9d9"/>
    <circle cx="62" cy="347" r="9" fill="#d9d9d9"/>
  </g>
  <circle cx="100" cy="320" r="9" fill="none" stroke="#7fb4e6" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- arrow 4->5 -->
  <path d="M174 355 L186 355" stroke="#c2a76a" stroke-width="3" stroke-linecap="round"/>
  <path d="M182 350 L188 355 L182 360" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 5: rods almost meeting at high apex ===== -->
  <rect x="190" y="280" width="140" height="150" rx="12" fill="#0d3b56"/>
  <circle cx="208" cy="298" r="10" fill="#2b6cb0"/>
  <text x="208" y="302" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">5</text>
  <!-- hexagon base -->
  <g stroke="#7fb4e6" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="260" y1="350" x2="298" y2="372"/>
    <line x1="298" y1="372" x2="298" y2="408"/>
    <line x1="298" y1="408" x2="260" y2="425"/>
    <line x1="260" y1="425" x2="222" y2="408"/>
    <line x1="222" y1="408" x2="222" y2="372"/>
    <line x1="222" y1="372" x2="260" y2="350"/>
  </g>
  <!-- rising rods nearly meeting at single high apex (dashed) -->
  <g stroke="#7fb4e6" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <line x1="260" y1="350" x2="260" y2="312"/>
    <line x1="298" y1="372" x2="260" y2="312"/>
    <line x1="298" y1="408" x2="260" y2="312"/>
    <line x1="260" y1="425" x2="260" y2="312"/>
    <line x1="222" y1="408" x2="260" y2="312"/>
    <line x1="222" y1="372" x2="260" y2="312"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="260" cy="350" r="9" fill="#d9d9d9"/>
    <circle cx="298" cy="372" r="9" fill="#d9d9d9"/>
    <circle cx="298" cy="408" r="9" fill="#d9d9d9"/>
    <circle cx="260" cy="425" r="9" fill="#d9d9d9"/>
    <circle cx="222" cy="408" r="9" fill="#d9d9d9"/>
    <circle cx="222" cy="372" r="9" fill="#d9d9d9"/>
  </g>
  <circle cx="260" cy="312" r="9" fill="none" stroke="#7fb4e6" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- arrow 5->6 -->
  <path d="M334 355 L346 355" stroke="#c2a76a" stroke-width="3" stroke-linecap="round"/>
  <path d="M342 350 L348 355 L342 360" stroke="#c2a76a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== STEP 6: finished hexagonal pyramid ===== -->
  <rect x="350" y="280" width="140" height="150" rx="12" fill="#0d3b56"/>
  <circle cx="368" cy="298" r="10" fill="#2b6cb0"/>
  <text x="368" y="302" text-anchor="middle" fill="#fdf2d6" font-size="12" font-weight="700">6</text>
  <!-- hidden back edges (dashed) -->
  <g stroke="#7fb4e6" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="7 6">
    <line x1="420" y1="350" x2="458" y2="372"/>
    <line x1="458" y1="372" x2="458" y2="408"/>
    <line x1="420" y1="350" x2="420" y2="312"/>
    <line x1="458" y1="372" x2="420" y2="312"/>
  </g>
  <!-- visible front base + side edges (solid) -->
  <g stroke="#7fb4e6" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="458" y1="408" x2="420" y2="425"/>
    <line x1="420" y1="425" x2="382" y2="408"/>
    <line x1="382" y1="408" x2="382" y2="372"/>
    <line x1="382" y1="372" x2="420" y2="350"/>
    <line x1="382" y1="372" x2="420" y2="312"/>
    <line x1="382" y1="408" x2="420" y2="312"/>
    <line x1="420" y1="425" x2="420" y2="312"/>
    <line x1="458" y1="408" x2="420" y2="312"/>
  </g>
  <g stroke-width="2.5" stroke="#ffffff">
    <circle cx="420" cy="350" r="9" fill="#d9d9d9"/>
    <circle cx="458" cy="372" r="9" fill="#d9d9d9"/>
    <circle cx="458" cy="408" r="9" fill="#d9d9d9"/>
    <circle cx="420" cy="425" r="9" fill="#d9d9d9"/>
    <circle cx="382" cy="408" r="9" fill="#d9d9d9"/>
    <circle cx="382" cy="372" r="9" fill="#d9d9d9"/>
    <circle cx="420" cy="312" r="10" fill="#ffd76a"/>
  </g>

  <!-- reminder -->
  <text x="260" y="442" text-anchor="middle" fill="#1d4e89" font-size="13">Baue dein Modell — die <tspan font-weight="700">übrigen Teile</tspan> kommen in die Mitte.</text>

  <!-- footer -->
  <text x="40" y="458" fill="#7a6a4a" font-size="11">C6 · Karte 3/5</text>
  <text x="480" y="458" text-anchor="end" font-size="13"><tspan fill="#e0a92e">★ ★ ★</tspan></text>
</svg>
