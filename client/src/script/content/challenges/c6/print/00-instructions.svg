<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header band -->
  <rect x="20" y="14" width="360" height="46" rx="10" fill="#1d4e89"/>
  <text x="200" y="36" text-anchor="middle" fill="#bfe0ff" font-size="13" letter-spacing="2">BLAUES SCHLOSS</text>
  <text x="200" y="53" text-anchor="middle" fill="#fdf2d6" font-size="14" font-style="italic">So bekommt ihr eure Zahl</text>

  <!-- title -->
  <text x="200" y="82" text-anchor="middle" fill="#1d4e89" font-size="22" font-weight="700">Geomag-Bauwerke</text>

  <!-- steps -->
  <g fill="#2a2118" font-size="13">
    <text x="34" y="104"><tspan fill="#1d4e89" font-weight="700">1.</tspan>  Jeder nimmt <tspan font-weight="700">einen Beutel</tspan> und die passende Baukarte.</text>
    <text x="34" y="125"><tspan fill="#1d4e89" font-weight="700">2.</tspan>  Baue dein <tspan font-weight="700">Bauwerk</tspan> genau nach dem Plan.</text>
    <text x="34" y="146"><tspan fill="#1d4e89" font-weight="700">3.</tspan>  Legt alle <tspan font-weight="700">übrigen Teile</tspan> zusammen — wie viele sind es?</text>
    <text x="34" y="167"><tspan fill="#1d4e89" font-weight="700">4.</tspan>  Sucht die Anzahl in der <tspan font-weight="700">Schatz-Tabelle</tspan> — die Zahl daneben ist eure Zahl!</text>
  </g>

  <!-- treasure mapping table: übrige Teile -> Zahl -->
  <text x="200" y="204" text-anchor="middle" fill="#1d4e89" font-size="13" font-weight="700" letter-spacing="1">SCHATZ-TABELLE</text>
  <g font-size="11" fill="#7a6a4a" text-anchor="end">
    <text x="40" y="230">Übrige</text>
    <text x="40" y="258">Zahl</text>
  </g>
  <g text-anchor="middle">
    <!-- column 1: 8 -> 4 -->
    <rect x="52" y="216" width="60" height="50" rx="8" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <line x1="52" y1="240" x2="112" y2="240" stroke="#c2a76a" stroke-width="1"/>
    <text x="82" y="234" fill="#2a2118" font-size="16" font-weight="700">8</text>
    <text x="82" y="259" fill="#1d4e89" font-size="16" font-weight="700">4</text>
    <!-- column 2: 9 -> 1 -->
    <rect x="118" y="216" width="60" height="50" rx="8" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <line x1="118" y1="240" x2="178" y2="240" stroke="#c2a76a" stroke-width="1"/>
    <text x="148" y="234" fill="#2a2118" font-size="16" font-weight="700">9</text>
    <text x="148" y="259" fill="#1d4e89" font-size="16" font-weight="700">1</text>
    <!-- column 3: 10 -> 6 (the answer) -->
    <rect x="184" y="216" width="60" height="50" rx="8" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <line x1="184" y1="240" x2="244" y2="240" stroke="#c2a76a" stroke-width="1"/>
    <text x="214" y="234" fill="#2a2118" font-size="16" font-weight="700">10</text>
    <text x="214" y="259" fill="#1d4e89" font-size="16" font-weight="700">6</text>
    <!-- column 4: 11 -> 3 -->
    <rect x="250" y="216" width="60" height="50" rx="8" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <line x1="250" y1="240" x2="310" y2="240" stroke="#c2a76a" stroke-width="1"/>
    <text x="280" y="234" fill="#2a2118" font-size="16" font-weight="700">11</text>
    <text x="280" y="259" fill="#1d4e89" font-size="16" font-weight="700">3</text>
    <!-- column 5: 12 -> 9 -->
    <rect x="316" y="216" width="60" height="50" rx="8" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <line x1="316" y1="240" x2="376" y2="240" stroke="#c2a76a" stroke-width="1"/>
    <text x="346" y="234" fill="#2a2118" font-size="16" font-weight="700">12</text>
    <text x="346" y="259" fill="#1d4e89" font-size="16" font-weight="700">9</text>
  </g>

  <!-- footer -->
  <text x="200" y="285" text-anchor="middle" fill="#7a6a4a" font-size="12">C6 · 5 Beutel · 5 Baukarten</text>
</svg>
