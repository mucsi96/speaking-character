<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="c9-instr-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#333333"/>
    </linearGradient>
  </defs>

  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header band -->
  <rect x="20" y="14" width="360" height="46" rx="10" fill="#1f5d3a"/>
  <text x="200" y="36" text-anchor="middle" fill="#bdeccb" font-size="13" letter-spacing="2">GRÜNES SCHLOSS</text>
  <text x="200" y="53" text-anchor="middle" fill="#fdf2d6" font-size="14" font-style="italic">So bekommt ihr eure Zahl</text>

  <!-- title -->
  <text x="200" y="82" text-anchor="middle" fill="#1f5d3a" font-size="22" font-weight="700">Schatz-Puzzle</text>

  <!-- steps -->
  <g fill="#2a2118" font-size="13">
    <text x="34" y="106"><tspan fill="#1f5d3a" font-weight="700">1.</tspan>  Nehmt alle <tspan font-weight="700">Puzzleteile</tspan> aus dem Beutel.</text>
    <text x="34" y="128"><tspan fill="#1f5d3a" font-weight="700">2.</tspan>  Setzt das <tspan font-weight="700">Bild gemeinsam</tspan> zusammen — alle helfen mit.</text>
    <text x="34" y="150"><tspan fill="#1f5d3a" font-weight="700">3.</tspan>  Schaut genau hin: Welche <tspan font-weight="700">Zahl</tspan> erscheint?</text>
    <text x="34" y="172"><tspan fill="#1f5d3a" font-weight="700">4.</tspan>  Diese Zahl ist eure <tspan font-weight="700">Zahl</tspan> für das grüne Schloss!</text>
  </g>

  <!-- assemble -> number appears -->
  <g>
    <!-- scattered pieces -->
    <g transform="translate(52,212)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="url(#c9-instr-panel)" transform="rotate(-12 11 11)"/>
      <rect x="20" y="6" width="22" height="22" rx="4" fill="url(#c9-instr-panel)" transform="rotate(9 31 17)"/>
      <rect x="6" y="22" width="22" height="22" rx="4" fill="url(#c9-instr-panel)" transform="rotate(15 17 33)"/>
      <rect x="28" y="26" width="22" height="22" rx="4" fill="url(#c9-instr-panel)" transform="rotate(-7 39 37)"/>
    </g>
    <text x="118" y="248" text-anchor="middle" fill="#7a6a4a" font-size="13">durcheinander</text>

    <!-- arrow -->
    <text x="200" y="247" text-anchor="middle" fill="#1f5d3a" font-size="26" font-weight="700">→</text>

    <!-- assembled panel revealing the number -->
    <rect x="244" y="208" width="96" height="62" rx="10" fill="url(#c9-instr-panel)"/>
    <text x="292" y="256" text-anchor="middle" fill="#f1e6c9" font-size="58" font-weight="700">?</text>
    <g stroke="#ffffff" stroke-width="1" opacity="0.22">
      <line x1="276" y1="208" x2="276" y2="270"/>
      <line x1="308" y1="208" x2="308" y2="270"/>
      <line x1="244" y1="229" x2="340" y2="229"/>
      <line x1="244" y1="249" x2="340" y2="249"/>
    </g>
  </g>

  <!-- footer -->
  <circle cx="30" cy="281" r="6" fill="#2e7d4f"/>
  <text x="200" y="285" text-anchor="middle" fill="#7a6a4a" font-size="12">C9 · 1 Puzzle</text>
</svg>
