<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="c1-03-ball" cx="34%" cy="30%" r="75%">
      <stop offset="0" stop-color="#6a6a6a"/>
      <stop offset="0.7" stop-color="#141414"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <rect x="20" y="16" width="360" height="44" rx="10" fill="#8c2b22"/>
  <text x="200" y="45" text-anchor="middle" fill="#fdf2d6" font-size="22" font-weight="700">Aufgabe 3</text>
  <text x="200" y="80" text-anchor="middle" fill="#8c2b22" font-size="14" letter-spacing="2">ZAHLENPYRAMIDE</text>

  <!-- cannonball badge -->
  <circle cx="56" cy="150" r="26" fill="url(#c1-03-ball)"/>
  <text x="56" y="157" text-anchor="middle" fill="#fdf2d6" font-size="22" font-weight="700">3</text>

  <!-- pyramid: each brick = the two below added together -->
  <g font-size="20" font-weight="700" text-anchor="middle">
    <!-- top (answer) -->
    <rect x="175" y="88" width="50" height="34" rx="6" fill="#fdf6e3" stroke="#d6463a" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="200" y="112" fill="#e6d4a6">?</text>
    <!-- middle -->
    <rect x="145" y="128" width="50" height="34" rx="6" fill="#fdf6e3" stroke="#d6463a" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="170" y="152" fill="#e6d4a6">?</text>
    <rect x="205" y="128" width="50" height="34" rx="6" fill="#fdf6e3" stroke="#d6463a" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="230" y="152" fill="#e6d4a6">?</text>
    <!-- bottom (given) -->
    <rect x="115" y="168" width="50" height="34" rx="6" fill="#e9d7a6" stroke="#b08a3a" stroke-width="2"/>
    <text x="140" y="192" fill="#2a2118">8</text>
    <rect x="175" y="168" width="50" height="34" rx="6" fill="#e9d7a6" stroke="#b08a3a" stroke-width="2"/>
    <text x="200" y="192" fill="#2a2118">6</text>
    <rect x="235" y="168" width="50" height="34" rx="6" fill="#e9d7a6" stroke="#b08a3a" stroke-width="2"/>
    <text x="260" y="192" fill="#2a2118">5</text>
  </g>

  <text x="200" y="220" text-anchor="middle" fill="#2a2118" font-size="12">Jeder Stein = die zwei Steine darunter zusammen. Oberster Stein = Ergebnis.</text>

  <!-- answer slot -->
  <rect x="90" y="230" width="220" height="44" rx="10" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
  <text x="108" y="258" fill="#8c2b22" font-size="17">Ergebnis =</text>
  <line x1="210" y1="262" x2="292" y2="262" stroke="#c2a76a" stroke-width="2" stroke-dasharray="4 5"/>

  <circle cx="44" cy="284" r="6" fill="#d6463a"/>
  <text x="56" y="289" fill="#7a6a4a" font-size="12">C1</text>
  <text x="356" y="289" text-anchor="end" font-size="14"><tspan fill="#e0a92e">★ ★ ★</tspan></text>
</svg>
