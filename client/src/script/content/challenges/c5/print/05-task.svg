<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="c5-05-drop" cx="34%" cy="30%" r="75%">
      <stop offset="0" stop-color="#7fb4e6"/>
      <stop offset="0.7" stop-color="#2b6cb0"/>
      <stop offset="1" stop-color="#1d4e89"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header -->
  <rect x="20" y="16" width="360" height="44" rx="10" fill="#1d4e89"/>
  <text x="200" y="45" text-anchor="middle" fill="#fdf2d6" font-size="22" font-weight="700">Aufgabe 5</text>
  <text x="200" y="84" text-anchor="middle" fill="#1d4e89" font-size="13" letter-spacing="2">WELCHE ZAHL KOMMT ALS NÄCHSTES?</text>

