  <circle cx="58" cy="160" r="26" fill="url(#c5-05-drop)"/>
  <text x="58" y="167" text-anchor="middle" fill="#fdf2d6" font-size="22" font-weight="700">5</text>

  <!-- number sequence (steps +1, +2, +3, +4) -->
  <text x="232" y="172" text-anchor="middle" fill="#2a2118" font-size="34" letter-spacing="2" font-weight="700">2&#160;·&#160;3&#160;·&#160;5&#160;·&#160;8&#160;·&#160;<tspan fill="#2b6cb0">?</tspan></text>

  <!-- answer slot -->
  <rect x="70" y="214" width="260" height="50" rx="10" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
  <text x="92" y="246" fill="#1d4e89" font-size="17">Nächste Zahl =</text>
  <line x1="226" y1="250" x2="312" y2="250" stroke="#c2a76a" stroke-width="2" stroke-dasharray="4 5"/>

  <!-- footer -->
  <circle cx="44" cy="284" r="6" fill="#2b6cb0"/>
  <text x="56" y="289" fill="#7a6a4a" font-size="12">C5</text>
  <text x="356" y="289" text-anchor="end" font-size="14"><tspan fill="#e0a92e">★ ★ ★</tspan></text>
