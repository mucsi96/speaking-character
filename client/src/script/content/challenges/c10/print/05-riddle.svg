<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header band -->
  <rect x="20" y="14" width="360" height="40" rx="10" fill="#8a6510"/>
  <text x="200" y="41" text-anchor="middle" fill="#fdf2d6" font-size="20" font-weight="700" letter-spacing="2">RÄTSEL 5</text>

  <!-- question -->
  <g font-size="15" text-anchor="middle">
    <text x="200" y="74" fill="#2a2118">Ich habe ein Gesicht und zwei Hände,</text>
    <text x="200" y="93" fill="#2a2118">aber keinen Körper. Ich sage dir die Zeit.</text>
    <text x="200" y="118" fill="#8a6510" font-size="17" font-weight="700">Was bin ich?</text>
  </g>

  <!-- pick the right answer -> number -->
  <text x="200" y="146" text-anchor="middle" fill="#7a6a4a" font-size="11" letter-spacing="1">RICHTIGE ANTWORT ANKREUZEN → ZAHL</text>

  <g font-size="17" fill="#2a2118">
    <!-- option 1 -->
    <circle cx="48" cy="170" r="11" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <text x="70" y="175">Das Buch</text>
    <rect x="322" y="158" width="46" height="26" rx="7" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <text x="345" y="176" text-anchor="middle" fill="#8a6510" font-weight="700">9</text>
    <!-- option 2 -->
    <circle cx="48" cy="208" r="11" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <text x="70" y="213">Die Uhr</text>
    <rect x="322" y="196" width="46" height="26" rx="7" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <text x="345" y="214" text-anchor="middle" fill="#8a6510" font-weight="700">2</text>
    <!-- option 3 -->
    <circle cx="48" cy="246" r="11" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <text x="70" y="251">Die Lampe</text>
    <rect x="322" y="234" width="46" height="26" rx="7" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <text x="345" y="252" text-anchor="middle" fill="#8a6510" font-weight="700">3</text>
  </g>

  <!-- footer -->
  <circle cx="44" cy="284" r="6" fill="#c9972b"/>
  <text x="56" y="289" fill="#7a6a4a" font-size="12">C10</text>
</svg>
