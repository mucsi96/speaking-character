<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header -->
  <rect x="20" y="16" width="360" height="44" rx="10" fill="#1f5d3a"/>
  <text x="200" y="45" text-anchor="middle" fill="#fdf2d6" font-size="22" font-weight="700">Satz 5</text>
  <text x="200" y="80" text-anchor="middle" fill="#1f5d3a" font-size="14" letter-spacing="2">VOKALE ZÄHLEN · a e i o u</text>

  <!-- the sentence -->
  <rect x="24" y="100" width="352" height="70" rx="10" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
  <text x="200" y="143" text-anchor="middle" fill="#2a2118" font-size="21" font-weight="700">Coco lacht und singt.</text>

  <!-- answer slot -->
  <rect x="70" y="192" width="260" height="46" rx="10" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
  <text x="92" y="221" fill="#1f5d3a" font-size="16">Vokale =</text>
  <line x1="190" y1="225" x2="312" y2="225" stroke="#c2a76a" stroke-width="2" stroke-dasharray="4 5"/>

  <!-- footer -->
  <circle cx="44" cy="284" r="6" fill="#2e7d4f"/>
  <text x="56" y="289" fill="#7a6a4a" font-size="12">C7</text>
  <text x="356" y="289" text-anchor="end" font-size="14"><tspan fill="#e0a92e">★</tspan><tspan fill="#d8c9a0"> ★ ★</tspan></text>
</svg>
