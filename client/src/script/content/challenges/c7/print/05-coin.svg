<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="c7-05-coin" cx="34%" cy="30%" r="75%">
      <stop offset="0" stop-color="#f0d27a"/>
      <stop offset="0.6" stop-color="#c9972b"/>
      <stop offset="1" stop-color="#8a6510"/>
    </radialGradient>
  </defs>

  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header -->
  <rect x="20" y="16" width="360" height="44" rx="10" fill="#1f5d3a"/>
  <text x="200" y="45" text-anchor="middle" fill="#fdf2d6" font-size="22" font-weight="700">Münze 5</text>
  <text x="200" y="80" text-anchor="middle" fill="#1f5d3a" font-size="14" letter-spacing="2">ZAHLEN-MÜNZE · MITZÄHLEN</text>

  <!-- the number coin -->
  <circle cx="200" cy="168" r="62" fill="url(#c7-05-coin)" stroke="#8a6510" stroke-width="4"/>
  <circle cx="200" cy="168" r="52" fill="none" stroke="#a87f1c" stroke-width="2" stroke-dasharray="3 5"/>
  <text x="200" y="192" text-anchor="middle" fill="#5c4408" font-size="68" font-weight="700">6</text>

  <!-- helper -->
  <text x="200" y="258" text-anchor="middle" fill="#7a6a4a" font-size="11" font-style="italic">Diese Zahl mit den anderen 4 Münzen zusammenzählen.</text>

  <!-- footer -->
  <circle cx="44" cy="284" r="6" fill="#2e7d4f"/>
  <text x="56" y="289" fill="#7a6a4a" font-size="12">C7</text>
  <text x="356" y="289" text-anchor="end" font-size="14"><tspan fill="#e0a92e">★ ★</tspan><tspan fill="#d8c9a0"> ★</tspan></text>
</svg>
