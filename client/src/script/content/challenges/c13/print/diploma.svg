<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="190mm" height="135mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment bg -->
  <rect x="0" y="0" width="760" height="540" rx="20" fill="#f6eccf"/>

  <!-- ornate double gold border -->
  <rect x="18" y="18" width="724" height="504" rx="14" fill="none" stroke="#c9972b" stroke-width="5"/>
  <rect x="30" y="30" width="700" height="480" rx="10" fill="none" stroke="#c9972b" stroke-width="2"/>

  <!-- subtitle near top -->
  <text x="380" y="68" text-anchor="middle" fill="#8a6510" font-size="17" font-style="italic">5× drucken — für jeden eines</text>

  <!-- heading -->
  <text x="380" y="138" text-anchor="middle" fill="#8c2b22" font-size="48" font-weight="700">🏴‍☠️ Echter Pirat 🏴‍☠️</text>

  <!-- crew line -->
  <text x="380" y="178" text-anchor="middle" fill="#3a2a05" font-size="24" font-style="italic">von Käpt'n Rotbarts Crew</text>

  <!-- decorative divider -->
  <line x1="240" y1="200" x2="520" y2="200" stroke="#c9972b" stroke-width="2" stroke-dasharray="2 6"/>

  <!-- name write-line -->
  <line x1="200" y1="280" x2="560" y2="280" stroke="#8a6510" stroke-width="2" stroke-dasharray="4 6"/>
  <text x="380" y="304" text-anchor="middle" fill="#7a6a4a" font-size="16" font-style="italic">Name des tapferen Seeräubers</text>

  <!-- body -->
  <text x="380" y="356" text-anchor="middle" fill="#2a2118" font-size="22">Hat alle vier Schlösser geknackt</text>
  <text x="380" y="386" text-anchor="middle" fill="#2a2118" font-size="22">und den Schatz gefunden. Arrr!</text>

  <!-- signature -->
  <text x="700" y="452" text-anchor="end" fill="#8c2b22" font-size="30" font-weight="700">🦜 Käpt'n Coco</text>
  <line x1="500" y1="464" x2="700" y2="464" stroke="#c9972b" stroke-width="1.5"/>

  <!-- footer -->
  <circle cx="48" cy="500" r="7" fill="#c9972b"/>
  <text x="62" y="505" fill="#7a6a4a" font-size="14">Finale · Urkunde</text>
</svg>
