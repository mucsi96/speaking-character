<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header band (lock color) -->
  <rect x="20" y="16" width="360" height="44" rx="10" fill="#c2362b"/>
  <text x="200" y="44" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700" letter-spacing="3">SCHLOSS-MARKE</text>

  <!-- rosette / badge -->
  <circle cx="200" cy="150" r="58" fill="#c2362b"/>
  <circle cx="200" cy="150" r="58" fill="none" stroke="#f6eccf" stroke-width="3"/>
  <circle cx="200" cy="150" r="50" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="3 5"/>
  <!-- ribbon tails -->
  <path d="M176 198 L168 250 L188 236 L200 252 L212 236 L232 250 L224 198 Z" fill="#c2362b"/>
  <text x="200" y="158" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">ROT</text>

  <!-- label -->
  <text x="200" y="240" text-anchor="middle" fill="#c2362b" font-size="18" font-weight="700">🔴 ROT</text>

  <!-- sub line: room + code -->
  <text x="200" y="266" text-anchor="middle" fill="#7a6a4a" font-size="16" font-style="italic">Kombüse · 3-7-4</text>

  <!-- footer -->
  <circle cx="44" cy="284" r="6" fill="#c2362b"/>
  <text x="56" y="289" fill="#7a6a4a" font-size="12">auf das Schloss kleben</text>
</svg>
