<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header -->
  <rect x="20" y="16" width="360" height="44" rx="10" fill="#1f5d3a"/>
  <text x="200" y="45" text-anchor="middle" fill="#fdf2d6" font-size="22" font-weight="700">Aufgabe 5</text>
  <text x="200" y="80" text-anchor="middle" fill="#1f5d3a" font-size="13" letter-spacing="2">ENTSCHLÜSSELE DEIN WORT</text>
  <text x="200" y="100" text-anchor="middle" fill="#7a6a4a" font-size="11">Schlag jedes Symbol im Geheim-Alphabet nach!</text>

  <!-- secret symbol sequence -->
  <rect x="40" y="116" width="320" height="92" rx="12" fill="#fffaf0" stroke="#c2a76a" stroke-width="2"/>
  <g text-anchor="middle">
    <text x="80" y="170" font-size="40">🧭</text>
    <text x="160" y="170" font-size="40">⚓</text>
    <text x="240" y="170" font-size="40">🪝</text>
    <text x="320" y="170" font-size="40">☠️</text>
    <line x1="58" y1="192" x2="102" y2="192" stroke="#1f5d3a" stroke-width="2"/>
    <line x1="138" y1="192" x2="182" y2="192" stroke="#1f5d3a" stroke-width="2"/>
    <line x1="218" y1="192" x2="262" y2="192" stroke="#1f5d3a" stroke-width="2"/>
    <line x1="298" y1="192" x2="342" y2="192" stroke="#1f5d3a" stroke-width="2"/>
  </g>

  <!-- answer slot -->
  <rect x="40" y="220" width="320" height="46" rx="10" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
  <text x="56" y="249" fill="#1f5d3a" font-size="15">Wort =</text>
  <line x1="112" y1="253" x2="232" y2="253" stroke="#c2a76a" stroke-width="2" stroke-dasharray="4 5"/>
  <text x="250" y="249" fill="#1f5d3a" font-size="15">Zahl =</text>
  <line x1="304" y1="253" x2="346" y2="253" stroke="#c2a76a" stroke-width="2" stroke-dasharray="4 5"/>

  <!-- footer -->
  <circle cx="44" cy="284" r="6" fill="#2e7d4f"/>
  <text x="56" y="289" fill="#7a6a4a" font-size="12">C8</text>
  <text x="356" y="289" text-anchor="end" font-size="14"><tspan fill="#e0a92e">★ ★ ★</tspan></text>
</svg>
