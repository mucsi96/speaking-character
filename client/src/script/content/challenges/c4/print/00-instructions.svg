<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header band -->
  <rect x="20" y="16" width="360" height="48" rx="10" fill="#1d4e89"/>
  <text x="200" y="40" text-anchor="middle" fill="#bfe0ff" font-size="13" letter-spacing="2">BLAUES SCHLOSS</text>
  <text x="200" y="58" text-anchor="middle" fill="#fdf2d6" font-size="15" font-style="italic">Halte jede Karte vor den Spiegel</text>

  <!-- title -->
  <text x="200" y="92" text-anchor="middle" fill="#1d4e89" font-size="26" font-weight="700">Spiegelschrift</text>

  <!-- steps -->
  <g fill="#2a2118" font-size="13.5">
    <text x="42" y="122"><tspan fill="#1d4e89" font-weight="700">1.</tspan>  Jeder nimmt eine Karte mit einem Wort.</text>
    <text x="42" y="146"><tspan fill="#1d4e89" font-weight="700">2.</tspan>  Das Wort sieht verkehrt herum aus.</text>
    <text x="42" y="170"><tspan fill="#1d4e89" font-weight="700">3.</tspan>  Halte die Karte vor einen <tspan font-weight="700">Spiegel</tspan>.</text>
    <text x="42" y="194"><tspan fill="#1d4e89" font-weight="700">4.</tspan>  Lies die Wörter der Reihe nach: ① ② ③ ④ ⑤.</text>
    <text x="42" y="218"><tspan fill="#1d4e89" font-weight="700">5.</tspan>  Der Satz verrät euch eine <tspan font-weight="700">Zahl</tspan>!</text>
  </g>

  <!-- mirror motif -->
  <g transform="translate(330,238)">
    <rect x="-24" y="-30" width="48" height="60" rx="24" fill="#bfe0ff" stroke="#2b6cb0" stroke-width="2"/>
    <rect x="-16" y="-22" width="32" height="44" rx="16" fill="#eaf5ff"/>
    <line x1="-9" y1="-14" x2="-2" y2="-19" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- footer chip -->
  <circle cx="44" cy="258" r="7" fill="#2b6cb0"/>
  <text x="58" y="263" fill="#7a6a4a" font-size="13">C4 · 5 Karten</text>
</svg>
