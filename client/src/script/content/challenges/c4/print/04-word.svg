<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header band -->
  <rect x="20" y="16" width="360" height="44" rx="10" fill="#1d4e89"/>
  <text x="200" y="44" text-anchor="middle" fill="#bfe0ff" font-size="16" letter-spacing="3" font-weight="700">SPIEGEL-KARTE</text>

  <!-- position number -->
  <circle cx="58" cy="108" r="24" fill="#bfe0ff" stroke="#2b6cb0" stroke-width="2"/>
  <text x="58" y="119" text-anchor="middle" fill="#1d4e89" font-size="30" font-weight="700">④</text>

  <!-- mirrored word -->
  <text x="0" y="0" text-anchor="middle" transform="translate(200,182) scale(-1,1)" font-size="48" font-weight="700" fill="#1d4e89">ZÄHLT</text>

  <!-- baseline guide -->
  <line x1="90" y1="206" x2="310" y2="206" stroke="#c2a76a" stroke-width="2" stroke-dasharray="4 5"/>

  <!-- footer chip -->
  <circle cx="44" cy="262" r="7" fill="#2b6cb0"/>
  <text x="58" y="267" fill="#7a6a4a" font-size="13">C4</text>
</svg>
