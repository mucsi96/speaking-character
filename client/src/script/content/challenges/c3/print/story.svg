<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="190mm" height="135mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="760" height="540" rx="20" fill="#f6eccf"/>
  <rect x="12" y="12" width="736" height="516" rx="14" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header band -->
  <rect x="40" y="28" width="680" height="70" rx="12" fill="#8c2b22"/>
  <text x="380" y="58" text-anchor="middle" fill="#f6c95b" font-size="16" letter-spacing="3">ROTES SCHLOSS · KÜCHE</text>
  <text x="380" y="82" text-anchor="middle" fill="#fdf2d6" font-size="16" font-style="italic">Jeder liest eine Zeile laut — zählt, wie oft PAPAGEI vorkommt!</text>

  <!-- title -->
  <text x="380" y="138" text-anchor="middle" fill="#8c2b22" font-size="34" font-weight="700">Käpt'n Rotbart und der Schatz <tspan font-size="30">🦜</tspan></text>

  <!-- inner parchment panel -->
  <rect x="40" y="158" width="680" height="318" rx="14" fill="#fdf6e3" stroke="#c2a76a" stroke-width="1.5"/>

  <!-- story lines -->
  <g fill="#2a2118" font-size="21">
    <!-- 1 -->
    <text x="60" y="194"><tspan fill="#8c2b22" font-weight="700">1.</tspan>  Vor langer Zeit segelte Käpt'n Rotbart über das wilde Meer.</text>
    <text x="84" y="224">Auf seiner Schulter saß ein bunter <tspan font-weight="700" fill="#8c2b22">PAPAGEI</tspan>.</text>

    <!-- 2 -->
    <text x="60" y="262"><tspan fill="#8c2b22" font-weight="700">2.</tspan>  Der <tspan font-weight="700" fill="#8c2b22">PAPAGEI</tspan> rief jeden Morgen laut: „Land in Sicht!"</text>

    <!-- 3 -->
    <text x="60" y="300"><tspan fill="#8c2b22" font-weight="700">3.</tspan>  Eines Tages fand die Crew eine geheimnisvolle Insel</text>
    <text x="84" y="330">mit Palmen und goldenem Sand.</text>

    <!-- 4 -->
    <text x="60" y="368"><tspan fill="#8c2b22" font-weight="700">4.</tspan>  Der schlaue <tspan font-weight="700" fill="#8c2b22">PAPAGEI</tspan> flog voraus und zeigte den Weg</text>
    <text x="84" y="398">zu einer dunklen Höhle.</text>

    <!-- 5 -->
    <text x="60" y="436"><tspan fill="#8c2b22" font-weight="700">5.</tspan>  In der Höhle glitzerte eine große Truhe voller Gold.</text>
    <text x="84" y="466">Alle jubelten, und der <tspan font-weight="700" fill="#8c2b22">PAPAGEI</tspan> tanzte vor Freude!</text>
  </g>

  <!-- footer chip -->
  <circle cx="60" cy="508" r="7" fill="#d6463a"/>
  <text x="74" y="513" fill="#7a6a4a" font-size="14">Küche · C3 · laut vorlesen</text>
</svg>
