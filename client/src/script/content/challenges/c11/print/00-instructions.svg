<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header band -->
  <rect x="20" y="14" width="360" height="46" rx="10" fill="#8a6510"/>
  <text x="200" y="36" text-anchor="middle" fill="#ffe9a8" font-size="13" letter-spacing="2">GOLDENES SCHLOSS</text>
  <text x="200" y="53" text-anchor="middle" fill="#fdf2d6" font-size="14" font-style="italic">So bekommt ihr eure Zahl</text>

  <!-- title -->
  <text x="200" y="82" text-anchor="middle" fill="#8a6510" font-size="22" font-weight="700">Kompass-Kurs</text>

  <!-- steps -->
  <g fill="#2a2118" font-size="13">
    <text x="34" y="106"><tspan fill="#8a6510" font-weight="700">1.</tspan>  Jeder nimmt eine <tspan font-weight="700">Kompass-Karte</tspan> mit einem Schiff.</text>
    <text x="34" y="128"><tspan fill="#8a6510" font-weight="700">2.</tspan>  Dreht so oft <tspan font-weight="700">nach rechts</tspan> (↻) und findet die <tspan font-weight="700">End-Richtung</tspan>.</text>
    <text x="34" y="150"><tspan fill="#8a6510" font-weight="700">3.</tspan>  Sammelt alle 5 — wie viele schauen nach <tspan font-weight="700">SÜDEN (↓)</tspan>?</text>
    <text x="34" y="172"><tspan fill="#8a6510" font-weight="700">4.</tspan>  Sucht die <tspan font-weight="700">Anzahl</tspan> in der Schatz-Tabelle — die Zahl daneben!</text>
  </g>

  <!-- treasure mapping table: Anzahl -> Zahl -->
  <text x="200" y="204" text-anchor="middle" fill="#8a6510" font-size="13" font-weight="700" letter-spacing="1">SCHATZ-TABELLE</text>
  <g font-size="12" fill="#7a6a4a" text-anchor="end">
    <text x="40" y="230">Anzahl</text>
    <text x="40" y="258">Zahl</text>
  </g>
  <g text-anchor="middle">
    <!-- column 1: 1 -> 7 -->
    <rect x="52" y="216" width="60" height="50" rx="8" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <line x1="52" y1="240" x2="112" y2="240" stroke="#c2a76a" stroke-width="1"/>
    <text x="82" y="234" fill="#2a2118" font-size="16" font-weight="700">1</text>
    <text x="82" y="259" fill="#8a6510" font-size="16" font-weight="700">7</text>
    <!-- column 2: 2 -> 3 (the answer) -->
    <rect x="118" y="216" width="60" height="50" rx="8" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <line x1="118" y1="240" x2="178" y2="240" stroke="#c2a76a" stroke-width="1"/>
    <text x="148" y="234" fill="#2a2118" font-size="16" font-weight="700">2</text>
    <text x="148" y="259" fill="#8a6510" font-size="16" font-weight="700">3</text>
    <!-- column 3: 3 -> 5 -->
    <rect x="184" y="216" width="60" height="50" rx="8" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <line x1="184" y1="240" x2="244" y2="240" stroke="#c2a76a" stroke-width="1"/>
    <text x="214" y="234" fill="#2a2118" font-size="16" font-weight="700">3</text>
    <text x="214" y="259" fill="#8a6510" font-size="16" font-weight="700">5</text>
    <!-- column 4: 4 -> 1 -->
    <rect x="250" y="216" width="60" height="50" rx="8" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <line x1="250" y1="240" x2="310" y2="240" stroke="#c2a76a" stroke-width="1"/>
    <text x="280" y="234" fill="#2a2118" font-size="16" font-weight="700">4</text>
    <text x="280" y="259" fill="#8a6510" font-size="16" font-weight="700">1</text>
    <!-- column 5: 5 -> 9 -->
    <rect x="316" y="216" width="60" height="50" rx="8" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
    <line x1="316" y1="240" x2="376" y2="240" stroke="#c2a76a" stroke-width="1"/>
    <text x="346" y="234" fill="#2a2118" font-size="16" font-weight="700">5</text>
    <text x="346" y="259" fill="#8a6510" font-size="16" font-weight="700">9</text>
  </g>

  <!-- footer -->
  <text x="200" y="285" text-anchor="middle" fill="#7a6a4a" font-size="12">C11 · 5 Karten</text>
</svg>
