<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="c2-04-coin" cx="34%" cy="30%" r="75%">
      <stop offset="0" stop-color="#f0d27a"/>
      <stop offset="0.6" stop-color="#c9972b"/>
      <stop offset="1" stop-color="#8a6510"/>
    </radialGradient>
  </defs>

  <!-- parchment + cut frame -->
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header -->
  <rect x="20" y="16" width="360" height="44" rx="10" fill="#8c2b22"/>
  <text x="200" y="45" text-anchor="middle" fill="#fdf2d6" font-size="22" font-weight="700">Aufgabe 4</text>
  <text x="200" y="80" text-anchor="middle" fill="#8c2b22" font-size="14" letter-spacing="2">MÜNZEN ORDNEN · KLEIN → GROSS</text>

  <!-- coin pool: 10 gold coins, shuffled -->
  <g font-size="15" font-weight="700" fill="#6b4e08" text-anchor="middle">
    <circle cx="64" cy="108" r="16" fill="url(#c2-04-coin)" stroke="#8a6510" stroke-width="2"/><text x="64" y="113">33</text>
    <circle cx="132" cy="108" r="16" fill="url(#c2-04-coin)" stroke="#8a6510" stroke-width="2"/><text x="132" y="113">7</text>
    <circle cx="200" cy="108" r="16" fill="url(#c2-04-coin)" stroke="#8a6510" stroke-width="2"/><text x="200" y="113">55</text>
    <circle cx="268" cy="108" r="16" fill="url(#c2-04-coin)" stroke="#8a6510" stroke-width="2"/><text x="268" y="113">20</text>
    <circle cx="336" cy="108" r="16" fill="url(#c2-04-coin)" stroke="#8a6510" stroke-width="2"/><text x="336" y="113">62</text>
    <circle cx="64" cy="146" r="16" fill="url(#c2-04-coin)" stroke="#8a6510" stroke-width="2"/><text x="64" y="151">13</text>
    <circle cx="132" cy="146" r="16" fill="url(#c2-04-coin)" stroke="#8a6510" stroke-width="2"/><text x="132" y="151">47</text>
    <circle cx="200" cy="146" r="16" fill="url(#c2-04-coin)" stroke="#8a6510" stroke-width="2"/><text x="200" y="151">26</text>
    <circle cx="268" cy="146" r="16" fill="url(#c2-04-coin)" stroke="#8a6510" stroke-width="2"/><text x="268" y="151">58</text>
    <circle cx="336" cy="146" r="16" fill="url(#c2-04-coin)" stroke="#8a6510" stroke-width="2"/><text x="336" y="151">51</text>
  </g>

  <!-- ordering strip: write coins klein -> gross; read the one on the star -->
  <text x="26" y="176" fill="#7a6a4a" font-size="11">klein</text>
  <text x="374" y="176" text-anchor="end" fill="#7a6a4a" font-size="11">groß ▸</text>
  <text x="217.6" y="176" text-anchor="middle" fill="#8c2b22" font-size="15" font-weight="700">★</text>
  <rect x="24" y="180" width="352" height="26" rx="8" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
  <rect x="201" y="181" width="33" height="24" fill="none" stroke="#8c2b22" stroke-width="2.5"/>
  <g stroke="#e4d6ad" stroke-width="1">
    <line x1="59" y1="182" x2="59" y2="204"/>
    <line x1="94" y1="182" x2="94" y2="204"/>
    <line x1="130" y1="182" x2="130" y2="204"/>
    <line x1="165" y1="182" x2="165" y2="204"/>
    <line x1="200" y1="182" x2="200" y2="204"/>
    <line x1="235" y1="182" x2="235" y2="204"/>
    <line x1="271" y1="182" x2="271" y2="204"/>
    <line x1="306" y1="182" x2="306" y2="204"/>
    <line x1="341" y1="182" x2="341" y2="204"/>
  </g>

  <!-- answer slot -->
  <rect x="70" y="214" width="260" height="44" rx="10" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
  <text x="92" y="242" fill="#8c2b22" font-size="16">Münze auf ★ =</text>
  <line x1="218" y1="246" x2="312" y2="246" stroke="#c2a76a" stroke-width="2" stroke-dasharray="4 5"/>

  <!-- helper -->
  <text x="200" y="272" text-anchor="middle" fill="#7a6a4a" font-size="10" font-style="italic">Erst ordnen — welche Münze liegt dann auf dem ★?</text>

  <!-- footer -->
  <circle cx="44" cy="284" r="6" fill="#d6463a"/>
  <text x="56" y="289" fill="#7a6a4a" font-size="12">C2</text>
  <text x="356" y="289" text-anchor="end" font-size="14"><tspan fill="#e0a92e">★ ★</tspan><tspan fill="#d8c9a0"> ★</tspan></text>
</svg>
