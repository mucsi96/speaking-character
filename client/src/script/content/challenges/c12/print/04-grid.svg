  <!-- answer slot -->
  <rect x="40" y="234" width="320" height="36" rx="9" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
  <text x="60" y="257" fill="#8a6510" font-size="14">Feld =</text>
  <rect x="118" y="240" width="64" height="24" rx="6" fill="#fff" stroke="#c2a76a" stroke-width="1.4"/>
  <text x="214" y="257" fill="#8a6510" font-size="14">Zahl =</text>
  <rect x="274" y="240" width="44" height="24" rx="6" fill="#fff" stroke="#c2a76a" stroke-width="1.4"/>

  <!-- footer -->
