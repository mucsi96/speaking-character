    <text x="236" y="183" fill="#7a6a4a">&#8594;</text>
    <rect x="250" y="168" width="38" height="22" rx="6" fill="#fdf6e3" stroke="#c2a76a" stroke-width="1.6"/><text x="269" y="183" fill="#8a6510" font-weight="700">4</text>
    <rect x="182" y="194" width="44" height="22" rx="6" fill="#fdf6e3" stroke="#c2a76a" stroke-width="1.6"/><text x="204" y="209" fill="#2a2118">A3</text>
    <text x="236" y="209" fill="#7a6a4a">&#8594;</text>
    <rect x="250" y="194" width="38" height="22" rx="6" fill="#fdf6e3" stroke="#c2a76a" stroke-width="1.6"/><text x="269" y="209" fill="#8a6510" font-weight="700">1</text>
