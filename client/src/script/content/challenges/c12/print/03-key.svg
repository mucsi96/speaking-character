<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100mm" height="75mm" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="c12-03-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="0.5" stop-color="#e8b53a"/>
      <stop offset="1" stop-color="#a9781a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="400" height="300" rx="16" fill="#f6eccf"/>
  <rect x="7" y="7" width="386" height="286" rx="12" fill="none" stroke="#c2a76a" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- header -->
  <rect x="20" y="14" width="360" height="40" rx="10" fill="#8a6510"/>
  <text x="200" y="41" text-anchor="middle" fill="#fdf2d6" font-size="20" font-weight="700" letter-spacing="2">SCHLÜSSEL 3</text>

  <!-- prompt -->
  <text x="200" y="80" text-anchor="middle" fill="#8a6510" font-size="15" font-weight="700">Zähle die Zacken am Bart!</text>

  <!-- golden key (bow left, bit right) -->
  <g stroke="#8a6510" stroke-width="1.4" stroke-linejoin="round">
    <circle cx="92" cy="150" r="32" fill="url(#c12-03-gold)"/>
    <circle cx="92" cy="150" r="14" fill="#f6eccf"/>
    <circle cx="92" cy="150" r="5" fill="#2b6cb0" stroke="none"/>
    <rect x="118" y="134" width="11" height="32" rx="3" fill="url(#c12-03-gold)"/>
    <rect x="116" y="142" width="204" height="16" rx="5" fill="url(#c12-03-gold)"/>
    <!-- 6 teeth -->
    <rect x="302" y="158" width="12" height="26" rx="2" fill="url(#c12-03-gold)"/>
    <rect x="282" y="158" width="12" height="16" rx="2" fill="url(#c12-03-gold)"/>
    <rect x="262" y="158" width="12" height="24" rx="2" fill="url(#c12-03-gold)"/>
    <rect x="242" y="158" width="12" height="16" rx="2" fill="url(#c12-03-gold)"/>
    <rect x="222" y="158" width="12" height="26" rx="2" fill="url(#c12-03-gold)"/>
    <rect x="202" y="158" width="12" height="18" rx="2" fill="url(#c12-03-gold)"/>
  </g>

  <!-- answer slot -->
  <rect x="70" y="214" width="260" height="50" rx="10" fill="#fdf6e3" stroke="#c2a76a" stroke-width="2"/>
  <text x="92" y="246" fill="#8a6510" font-size="17">Zacken =</text>
  <line x1="196" y1="250" x2="312" y2="250" stroke="#c2a76a" stroke-width="2" stroke-dasharray="4 5"/>

  <!-- footer -->
  <circle cx="44" cy="284" r="6" fill="#c9972b"/>
  <text x="56" y="289" fill="#7a6a4a" font-size="12">C12</text>
  <text x="356" y="289" text-anchor="end" font-size="14"><tspan fill="#e0a92e">★ ★ ★</tspan></text>
</svg>
