name: Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-smoke-test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: localhost/speaking-character:test
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
      - name: Load image into Podman
        run: docker save localhost/speaking-character:test | podman load
      - name: Start pod and wait for health
        env:
          SKIP_BUILD: "1"
        run: scripts/pod_up.sh
      - name: Collect pod logs
        if: always()
        run: podman logs speaking-character-test-speaking-character 2>&1 || true
      - name: Stop pod
        if: always()
        run: scripts/pod_down.sh

  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-publish-${{ github.ref }}
      cancel-in-progress: true
    needs: smoke-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      hasNextVersion: ${{ steps.get_next_version.outputs.hasNextVersion }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get next version
        id: get_next_version
        uses: mucsi96/get-next-version@main
        with:
          prefix: 'v'

      - name: Set up Docker Buildx
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/speaking-character:${{ steps.get_next_version.outputs.version }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Create release
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_next_version.outputs.tag }}
          generate_release_notes: true

  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-deploy
      cancel-in-progress: false
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.publish.outputs.hasNextVersion == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: 'v0.2.7'

      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Deploy to Kubernetes
        env:
          AZURE_KEYVAULT_NAME: ${{ secrets.AZURE_KEYVAULT_NAME }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: scripts/deploy.sh
