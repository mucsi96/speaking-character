apiVersion: v1
kind: Pod
metadata:
  name: speaking-character-test
  labels:
    app: speaking-character-test
spec:
  restartPolicy: Never
  containers:
    - name: speaking-character
      image: localhost/speaking-character:test
      ports:
        - containerPort: 8080
          hostPort: 8080
      env:
        - name: PORT
          value: "8080"
        - name: CACHE_DIR
          value: /app/cache
        - name: ELEVENLABS_MODEL_ID
          value: eleven_multilingual_v2
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 3
        periodSeconds: 3
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
